<main style="margin-top: 90px;">
        <section class="py-5">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-lg-8">
                        <h1 class="fw-bold text-center mb-2">Contactez-nous</h1>
                        <p class="text-center text-muted mb-5">Une question, un problème technique ? Remplissez le formulaire ci-dessous.</p>
                        
                        <!-- Formulaire HTML5. L'ID 'contactForm' sera utilisé par JS au Commit 8 -->
                        <div class="card shadow-sm border-0 p-4">
                            <form id="contactForm" novalidate>
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label for="name" class="form-label fw-bold">Nom complet *</label>
                                        <input type="text" class="form-control" id="name" required>
                                        <div class="invalid-feedback">Veuillez entrer votre nom.</div>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="email" class="form-label fw-bold">Adresse Email *</label>
                                        <input type="email" class="form-control" id="email" required>
                                        <div class="invalid-feedback">Veuillez entrer un email valide.</div>
                                    </div>
                                    <div class="col-12">
                                        <label for="subject" class="form-label fw-bold">Sujet</label>
                                        <select class="form-select" id="subject">
                                            <option value="support">Support technique</option>
                                            <option value="sales">Service commercial</option>
                                            <option value="other">Autre demande</option>
                                        </select>
                                    </div>
                                    <div class="col-12">
                                        <label for="message" class="form-label fw-bold">Message (Min 20 caractères) *</label>
                                        <textarea class="form-control" id="message" rows="5" required minlength="20"></textarea>
                                        <div class="invalid-feedback">Le message doit contenir au moins 20 caractères.</div>
                                    </div>
                                    <!-- Zone pour afficher le message de succès généré par JS plus tard -->
                                    <div id="form-success-msg" class="alert alert-success d-none mt-3" role="alert">
                                        Votre message a été envoyé avec succès !
                                    </div>
                                    <div class="col-12 text-center mt-4">
                                        <button type="submit" class="btn btn-primary btn-lg fw-bold px-5">Envoyer le message</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <p>&copy; <span id="current-year"></span> AfriTalent. Tous droits réservés.</p>
    </main>
